plugins {
    id 'java'
    id 'io.qameta.allure' version '3.0.2'
}

group 'org.example'
version '1.0-SNAPSHOT'

repositories {
    mavenCentral()
}

dependencies {
    testImplementation 'org.junit.jupiter:junit-jupiter-api:5.8.1'
    testRuntimeOnly 'org.junit.jupiter:junit-jupiter-engine:5.8.1'
    testImplementation 'org.seleniumhq.selenium:selenium-java:4.41.0'
    testImplementation 'io.github.bonigarcia:webdrivermanager:5.9.2'

    testImplementation("io.qameta.allure:allure-junit5:2.29.1")
    testImplementation("io.qameta.allure:allure-commandline:2.30.0")
    testImplementation("io.qameta.allure:allure-assertj:2.29.1")
    testImplementation("io.qameta.allure:allure-java-commons:2.29.1")
    testImplementation("org.aspectj:aspectjweaver:1.9.7")
}

test {
    useJUnitPlatform()
}